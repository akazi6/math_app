<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ログイン</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <main class="container">
    <h1 class="title">ログイン</h1>
    <p class="subtitle">算数トレーニングへようこそ</p>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <ul class="flash-list">
          {% for message in messages %}
            <li class="flash">{{ message }}</li>
          {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}

    <form method="POST" class="form">
      <input class="input" type="text" name="username" placeholder="ユーザー名" required />
      <input class="input" type="password" name="password" placeholder="パスワード" required />
      <button class="button" type="submit">ログイン</button>
    </form>

    <p>アカウントをお持ちでない方は <a class="link" href="{{ url_for('register') }}">新規登録</a></p>
  </main>
</body>
</html>
